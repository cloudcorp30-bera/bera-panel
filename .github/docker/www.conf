[global]
; Send all PHP-FPM errors to stderr so Railway / Docker logs capture them.
error_log = /proc/self/fd/2
log_level = notice

; Write PID to a guaranteed-writable path (Dockerfile creates /var/run/php).
pid = /var/run/php/php-fpm.pid

; supervisord calls `php-fpm -F` which already keeps it in the foreground,
; but set daemonize = no here as belt-and-suspenders.
daemonize = no

[www]

user = nginx
group = nginx

listen = 127.0.0.1:9000
listen.owner = nginx
listen.group = nginx
listen.mode = 0750

; dynamic PM: always keep spare workers ready so the first request
; is never delayed by on-demand spawning.
pm = dynamic
pm.max_children = 9
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 200

; Forward all container environment variables into PHP scripts.
clear_env = no

; Pipe PHP-FPM worker output to Docker / Railway logs.
catch_workers_output = yes
decorate_workers_output = no
